    <p>
        問題設定: <br>
        $N$行$N$列のマス目$M$が与えられ、上から$i$行目、左から$j$列目のマスをマス$(i, j)$と表記する。
        $(s_y, s_x)$ から上下左右のマスに移動することを繰り返して、マス目に存在する$K$個のコインすべてを集めて、最終的に$(t_y, t_x)$に移動するより短い経路を求めたい。<br>
        <br>
        制約: <br>
        $N = 101, 50 \leq K \leq 100, 1 \leq s_x, s_y, t_x, t_y \leq N$ <br>
    </p>
