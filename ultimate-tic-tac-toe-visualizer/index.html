<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>Ultimate Tic Tac Toe Visualizer</title>
</head>

<body>
    <div id="input-area">
        Input:<br>
        <textarea type="text" id="game-flow-text" name="game-flow-text" cols="20" rows="20"></textarea>
    </div>

    <div id="visualize-area">
        Turn:<a id="turn-count-text">0</a><br>
        <input type="range" id="turn-count" name="turn-count" min="0" max="100" value="0" style="width:500px">
        <br>
    </div>

    <script src="script.js"></script>
</body>

</html>
