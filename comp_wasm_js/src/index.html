<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <title>TSP Visualizer</title>
</head>

<body>
    <p>
        Input: <a style="margin: 42px;"></a>
        min: <input id="min" size="10" value="1000"> max: <input id="max" size="10" value="2000"> <br>
        seed: <input id="seed" size="20" value="0">
        <br>
        <textarea id="input" rows="10" cols="60" style="resize: none;" spellcheck="false"></textarea>
    </p>

    <p>
        Output: <button id="run_button" type="button">Run</button> <a style="margin:67px;"></a> Time(ms):
        <input type="text" id="run_time" size="10px" value="1000">
        <br>
        Rust: <input id="res_rs" size="15px" value="0"> <a style="margin: 21px;"></a> JavaScript: <input id="res_js"
            size="15px" value="0"><br>
        <textarea id="output_rs" rows="10" cols="30" style="resize: none;" spellcheck="false"></textarea>
        <textarea id="output_js" rows="10" cols="30" style="resize: none;" spellcheck="false"></textarea>
    </p>

    <p>
        Visualize: <input type="radio" name="vis" value="rs"> Rust <input type="radio" name="vis" value="js"> JavaScript
        <input type="radio" name="vis" value="double" checked="true"> Both <input type="radio" name="vis" value="none">
        None <br>
        <canvas id="Visualizer" width="500" height="500"></canvas>
    </p>

    <script src="./bootstrap.js"></script>
</body>

</html>
